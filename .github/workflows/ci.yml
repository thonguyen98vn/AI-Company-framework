name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: cli/package-lock.json || cli/package.json
        
    - name: Install Dependencies
      working-directory: ./cli
      run: npm install
      
    - name: Run Tests
      working-directory: ./cli
      run: npm test
